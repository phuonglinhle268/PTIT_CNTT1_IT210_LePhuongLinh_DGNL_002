<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<h2>Museum Artifact Management</h2>

<form method="get">
    <input type="text" name="keyword" th:value="${keyword}"/>
    <button>Search</button>
</form>

<a class="btn btn-primary" href="/create" role="button" style="margin: 20px">Add</a>

<table class="table table-striped table-inverse">
    <thead class="thead-inverse">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Artist</th>
        <th>Date</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(list)}">
        <p style="color: red">Hiện chưa có tác phẩm nào trong triển lãm</p>
    </tr>

    <tr th:each="a : ${list}">
        <td th:text="${a.id}"></td>
        <td th:text="${a.name}"></td>
        <td th:text="${a.origin}"></td>
        <td th:text="${#temporals.format(a.date, 'dd/MM/yyyy')}"></td>
        <td >
            <a class="btn btn-primary" th:href="@{/edit/{id}(id=${a.id})}" role="button">Edit</a>
            <a class="btn btn-danger" th:href="@{/delete/{id}(id=${a.id})}"
               onclick="return confirm('Bạn có chắc muốn xóa chứ?')"
               role="button">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

<nav th:if="${totalPages > 1}" aria-label="Page navigation">
    <ul class="pagination">
        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
            <a class="page-link" th:href="@{/(page = ${currentPage - 1}, keyword = ${keyword})}" aria-label="Previous">
                <span aria-hidden="true">&laquo;</span>
                <span class="sr-only">Previous</span>
            </a>
        </li>
        <!--        <li class="page-item active"><a class="page-link" href="#"></a></li>-->
        <li class="page-item" th:each="i:${#numbers.sequence(0, totalPages -1)}"
            th:classappend="${i == currentPage} ? 'active'">
            <a class="page-link" th:href="@{/(page=${i}, keyword=${keyword})}" th:text="${i+1}"></a>
        </li>
        <li class="page-item" th:classappend="${currentPage == totalPages -1} ? 'disabled'">
            <a class="page-link" th:href="@{/(page=${currentPage + 1}, keyword=${keyword})}" aria-label="Next">
                <span aria-hidden="true">&raquo;</span>
                <span class="sr-only">Next</span>
            </a>
        </li>
    </ul>
</nav>



<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
